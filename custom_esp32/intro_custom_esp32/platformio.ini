[env:esp32s3_custom]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Force the use of the S3 internal USB hardware
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; These lines help PlatformIO locate the correct SDK headers
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

; If you have no PSRAM, use this (standard for many custom S3 modules)
board_build.arduino.memory_type = qio_qspi